<div #terminal class="h-screen bg-black text-green-400 font-mono p-4 overflow-y-auto">
  @for(line of lines(); track $index) {
    <div class="whitespace-pre-wrap">
      {{ line }}
    </div>
  }
  @if(_timer.isRunning()) {
    <div class="text-yellow-400 text-sm mb-4 border-b border-green-900 pb-2">
      ⏱ Focus session active — {{ _timer.format() }} remaining
    </div>
  }

  <div class="flex items-center mt-2">
    <span class="mr-2">></span>
    <span class="relative flex-1 flex items-center">
      <input #cmdInput [ngModel]="command()" (ngModelChange)="command.set($event)" (keydown.enter)="handleCommand()"
        class="bg-transparent outline-none w-full caret-transparent absolute inset-0 z-10" autofocus />
      <span class="pointer-events-none whitespace-pre">{{ command() }}<span class="animate-pulse">█</span></span>
    </span>
  </div>

</div>
